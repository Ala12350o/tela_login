<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tela de Login</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <div class="login-container">
    <h1>Login</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="Digite seu email" />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" required placeholder="Digite sua senha" />
        <div id="password-strength"></div>
      </div>

      <div class="form-group captcha">
        <label id="captcha-label"></label>
        <input type="text" id="captcha-input" placeholder="Digite o resultado" required />
      </div>

      <p id="error-message"></p>

      <button type="submit">Entrar</button>
    </form>

    <p class="register-text">Não tem conta? <a href="#">Cadastre-se</a></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
