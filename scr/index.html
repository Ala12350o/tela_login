<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Sistema com JSON Server</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login" class="card">
  <h2>Login</h2>
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginSenha" placeholder="Senha">
  <button onclick="fazerLogin()">Entrar</button>
  <p style="text-align:center;">ou</p>
  <button onclick="mostrarCadastro()">Criar Conta</button>
  <p id="loginErro" style="color:red;"></p>
</div>

<div id="cadastro" class="card" style="display:none;">
  <h2>Cadastro</h2>
  <input type="email" id="cadEmail" placeholder="Email">
  <input type="password" id="cadSenha" placeholder="Senha">
  <button onclick="fazerCadastro()">Cadastrar</button>
  <button onclick="mostrarLogin()">Voltar</button>
  <p id="cadErro" style="color:red;"></p>
</div>

<div id="perfil" class="card" style="display:none;">
  <h2>Perfil</h2>
  <img id="fotoPerfil">
  <p><strong>Nome:</strong> <span id="nomePerfil"></span></p>
  <p><strong>Idade:</strong> <span id="idadePerfil"></span></p>
  <p><strong>Rua:</strong> <span id="ruaPerfil"></span></p>
  <p><strong>Bairro:</strong> <span id="bairroPerfil"></span></p>
  <p><strong>Cidade:</strong> <span id="cidadePerfil"></span></p>
  <p><strong>Escola:</strong> <span id="escolaPerfil"></span></p>
  <p><strong>Ano Letivo:</strong> <span id="anoPerfil"></span></p>
</div>

<script src="script.js"></script>
</body>
</html>
